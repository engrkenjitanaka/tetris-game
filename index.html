<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Tetris</title>
  <script>if(localStorage.getItem('tetris_theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <div id="app">
    <header>
      <h1>TETRIS</h1>
      <div class="header-controls">
        <div class="audio-controls">
          <button id="btn-mute" class="icon-btn" aria-label="Mute/unmute music" title="Mute music">&#9834;</button>
          <input type="range" id="music-vol" class="volume-slider" min="0" max="100" step="1" value="40" aria-label="Music volume" title="Music volume">
        </div>
        <button id="btn-theme" class="theme-toggle" aria-label="Toggle light/dark mode" title="Switch to light mode">&#9728;</button>
      </div>
    </header>

    <main>
      <aside class="panel panel-left">
        <div class="stat-block">
          <div class="stat-label">HOLD</div>
          <canvas id="hold" width="120" height="120"></canvas>
        </div>
        <div class="stat-block">
          <div class="stat-label">SCORE</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">LEVEL</div>
          <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">LINES</div>
          <div class="stat-value" id="lines">0</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">HIGH SCORE</div>
          <div class="stat-value" id="high-score">0</div>
        </div>
      </aside>

      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-box">
            <div id="overlay-title">TETRIS</div>
            <div id="overlay-sub">Press <kbd>Enter</kbd> to start</div>
            <button id="btn-start">START GAME</button>
          </div>
        </div>
      </div>

      <aside class="panel panel-right">
        <div class="stat-block">
          <div class="stat-label">NEXT</div>
          <canvas id="next" width="120" height="120"></canvas>
        </div>
        <div class="stat-block controls-block">
          <div class="stat-label">CONTROLS</div>
          <div class="controls">
            <div><kbd>←</kbd><kbd>→</kbd> Move</div>
            <div><kbd>↑</kbd> Rotate</div>
            <div><kbd>↓</kbd> Soft drop</div>
            <div><kbd>Space</kbd> Hard drop</div>
            <div><kbd>Shift</kbd> Hold</div>
            <div><kbd>P</kbd> Pause</div>
          </div>
        </div>
      </aside>
    </main>

    <div id="touch-pad" class="touch-pad" aria-hidden="true">
      <button class="t-btn" id="t-hold" aria-label="Hold piece">HOLD</button>
      <button class="t-btn" id="t-left" aria-label="Move left">&#9664;</button>
      <button class="t-btn" id="t-rotate" aria-label="Rotate">&#10227;</button>
      <button class="t-btn" id="t-right" aria-label="Move right">&#9654;</button>
      <button class="t-btn" id="t-down" aria-label="Soft drop">&#9660;</button>
      <button class="t-btn" id="t-drop" aria-label="Hard drop">DROP</button>
      <button class="t-btn t-pause" id="t-pause" aria-label="Pause">&#10073;&#10073;</button>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
